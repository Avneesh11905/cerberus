name: cerberus

networks:
  cerberus_network:
    driver: bridge

services:
  cerb-postgres:
    image: postgres:18.4
    container_name: cerb-postgres
    restart: unless-stopped
    shm_size: '256mb'
    env_file:
      - .env
    command: [ "postgres", "-p", "52193" ]
    volumes:
      - ./postgres:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -p 52193 -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cerberus_network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  cerb-redis:
    image: redis:8.8.0
    container_name: cerb-redis
    restart: unless-stopped
    volumes:
      - ./redis/data:/data
      - ./redis/redis.acl:/mnt/users.acl:ro
    command: [ "redis-server", "--port", "52192", "--aclfile", "/mnt/users.acl" ]
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -p 52192 ping | grep -E '(PONG|NOAUTH)'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cerberus_network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  cerb-migrate:
    image: avneesh11905/cerberus-fastapi:latest
    profiles:
      - migrate
    restart: "no"
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env
    depends_on:
      cerb-postgres:
        condition: service_healthy
    volumes:
      - ./backend/keys:/app/keys:ro
    networks:
      - cerberus_network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  cerb-lb:
    image: nginx:1.31.2-alpine
    container_name: cerb-lb
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8000:8000"
    volumes:
      - ./nginx/lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      cerb-vite:
        condition: service_healthy
      cerb-fastapi:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000 > /dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cerberus_network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  cerb-fastapi:
    image: avneesh11905/cerberus-fastapi:latest
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      cerb-postgres:
        condition: service_healthy
      cerb-redis:
        condition: service_healthy
    volumes:
      - ./backend/keys:/app/keys:ro
    expose:
      - "8000"
    networks:
      - cerberus_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  cerb-celery-worker:
    image: avneesh11905/cerberus-fastapi:latest
    restart: unless-stopped
    command: celery -A src.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      cerb-postgres:
        condition: service_healthy
      cerb-redis:
        condition: service_healthy
    volumes:
      - ./backend/keys:/app/keys:ro
    networks:
      - cerberus_network
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f 'celery.*worker' > /dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  cerb-celery-beat:
    container_name: cerb-celery-beat
    image: avneesh11905/cerberus-fastapi:latest
    restart: unless-stopped
    command: celery -A src.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      cerb-postgres:
        condition: service_healthy
      cerb-redis:
        condition: service_healthy
    volumes:
      - ./backend/keys:/app/keys:ro
    networks:
      - cerberus_network
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f 'celery.*beat' > /dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  cerb-celery-logs-worker:
    image: avneesh11905/cerberus-fastapi:latest
    restart: unless-stopped
    command: celery -A src.celery_app worker -Q logs --loglevel=info
    env_file:
      - .env
    depends_on:
      cerb-postgres:
        condition: service_healthy
      cerb-redis:
        condition: service_healthy
    volumes:
      - ./backend/keys:/app/keys:ro
    networks:
      - cerberus_network
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f 'celery.*worker' > /dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  cerb-vite:
    image: avneesh11905/cerberus-vite:latest
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - cerberus_network
    env_file:
      - .env
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000 > /dev/null 2>&1" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
