server {
    listen 3000;
    server_name localhost;
    server_tokens off;

    root /usr/share/nginx/html;
    index _shell.html index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml font/woff font/woff2;

    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|webp|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /_shell.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /_shell.html;
    }
}
