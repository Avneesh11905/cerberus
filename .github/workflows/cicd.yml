name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BACKEND_IMAGE_NAME: avneesh11905/cerberus-fastapi
  FRONTEND_IMAGE_NAME: avneesh11905/cerberus-vite

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '!backend/**/*.md'
            frontend:
              - 'frontend/**'
              - '!frontend/**/*.md'

  python-ci:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: cerberus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CACHE_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      DB_ASYNC_URL: postgresql+asyncpg://user:password@localhost:5432/cerberus
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.14'
          enable-cache: true
          
      - name: Install backend dependencies and run tests
        run: |
          uv sync --dev
          cp ../.env.example .env
          uv run scripts/generate_keys.py
          uv run ruff check .
          uv run mypy . --check-untyped-defs
          uv run pytest

  node-ci:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install frontend dependencies and run tests
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run check
          npm run test

  backend-build:
    needs: [changes, python-ci]
    if: ${{ (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Read backend version
        id: version
        run: |
          VERSION=$(grep '^BACKEND_VERSION=' ../version.env | cut -d '=' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ env.BACKEND_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE_NAME }}:buildcache,mode=max

  frontend-build:
    needs: [changes, node-ci]
    if: ${{ (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Read frontend version
        id: version
        run: |
          VERSION=$(grep '^FRONTEND_VERSION=' ../version.env | cut -d '=' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          build-args: |
            VITE_API_URL=https://cerberus-api.aymahajan.in
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE_NAME }}:buildcache,mode=max

  deploy:
    needs: [backend-build, frontend-build]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.backend-build.result == 'success' || needs.backend-build.result == 'skipped') &&
      (needs.frontend-build.result == 'success' || needs.frontend-build.result == 'skipped') &&
      (needs.backend-build.result == 'success' || needs.frontend-build.result == 'success')
    runs-on: [self-hosted, home-server]
    steps:
      - name: Deploy to home server
        working-directory: /home/avneesh/cerberus
        run: |
          docker compose pull
          docker compose up -d
          # Restart Nginx so it clears its cached IP address of the old cerb-fastapi container
          docker compose restart cerb-lb

      - name: Health Check
        working-directory: /home/avneesh/cerberus
        run: |
          echo "Waiting for services to stabilize..."
          sleep 10
          docker compose ps
          
          echo "Checking Frontend..."
          curl -sS -f http://localhost:3001 > /dev/null
          
          echo "Checking Backend (Health)..."
          curl -sS -f http://localhost:8001/health > /dev/null
          
          echo "All services are up and healthy!"
