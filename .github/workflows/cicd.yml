name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BACKEND_IMAGE_NAME: avneesh11905/cerberus-fastapi
  FRONTEND_IMAGE_NAME: avneesh11905/cerberus-vite

jobs:
  # ── Path filter ─────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      alembic: ${{ steps.filter.outputs.alembic }}
    steps:
      - uses: actions/checkout@v7
        with:
          # fetch-depth: 0 ensures dorny/paths-filter can diff the entire commit history accurately
          fetch-depth: 0
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '!backend/**/*.md'
            frontend:
              - 'frontend/**'
              - '!frontend/**/*.md'
            alembic:
              - 'backend/alembic/versions/**'
              - 'backend/alembic/env.py'
              - 'backend/alembic.ini'

  # ── Backend CI ──────────────────────────────────────────────────────────────
  python-ci:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8.8.0
        ports:
          - 6379:6379
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: cerberus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CACHE_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      DB_ASYNC_URL: postgresql+asyncpg://user:password@localhost:5432/cerberus
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.14'
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Set up environment
        run: |
          cp ../.env.example .env
          uv run scripts/generate_keys.py

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy . --check-untyped-defs

      - name: Run tests (pytest)
        run: uv run pytest

  # ── Frontend CI ─────────────────────────────────────────────────────────────
  node-ci:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npm run typecheck

      - name: Format check (prettier)
        run: npm run check

      - name: Run tests (vitest)
        run: npm run test

  # ── Backend Docker build & push ──────────────────────────────────────────────
  backend-build:
    needs: [changes, python-ci]
    # Run on main if backend changed AND CI passed (or was skipped via workflow_dispatch)
    if: |
      (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      (needs.python-ci.result == 'success' || needs.python-ci.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Read backend version
        id: version
        run: |
          VERSION=$(grep '^BACKEND_VERSION=' version.env | cut -d '=' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ env.BACKEND_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE_NAME }}:buildcache,mode=max

  # ── Frontend Docker build & push ─────────────────────────────────────────────
  frontend-build:
    needs: [changes, node-ci]
    # Run on main if frontend changed AND CI passed (or was skipped via workflow_dispatch)
    if: |
      (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      (needs.node-ci.result == 'success' || needs.node-ci.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Read frontend version
        id: version
        run: |
          VERSION=$(grep '^FRONTEND_VERSION=' version.env | cut -d '=' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          build-args: |
            VITE_API_URL=https://cerberus-api.aymahajan.in
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE_NAME }}:buildcache,mode=max

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    needs: [changes, backend-build, frontend-build]
    # Deploy only when on main AND at least one build succeeded (the other may be skipped)
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.backend-build.result == 'success' || needs.backend-build.result == 'skipped') &&
      (needs.frontend-build.result == 'success' || needs.frontend-build.result == 'skipped') &&
      (needs.backend-build.result == 'success' || needs.frontend-build.result == 'success')
    runs-on: [self-hosted, home-server]
    # Deploy job only needs to run docker commands on the self-hosted runner;
    # no repo read access required at this stage.
    permissions: {}
    steps:
      - name: Pull latest images
        working-directory: /home/avneesh/cerberus
        run: docker compose pull

      - name: Run Alembic migrations
        # Only execute when alembic/versions or env.py changed in this push.
        # --rm ensures the container is auto-deleted the moment migrations finish.
        if: needs.changes.outputs.alembic == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: /home/avneesh/cerberus
        run: |
          echo "Schema changes detected — running Alembic migrations..."
          docker compose up -d cerb-postgres
          # Wait until postgres healthcheck passes before migrating
          until docker compose ps cerb-postgres | grep -q '(healthy)'; do
            echo "Waiting for postgres..."
            sleep 3
          done
          docker compose --profile migrate run --rm cerb-migrate
          echo "Migrations complete — container auto-deleted."

      - name: Start / update application stack
        working-directory: /home/avneesh/cerberus
        run: |
          docker compose up -d
          # Restart Nginx so it clears its cached IP address of the old cerb-fastapi container
          docker compose restart cerb-lb

      - name: Health Check
        working-directory: /home/avneesh/cerberus
        run: |
          echo "Waiting for services to stabilize..."
          docker compose ps

          echo "Checking Frontend..."
          curl -sS --fail --retry 12 --retry-delay 5 --retry-connrefused http://localhost:3001

          echo "Checking Backend (Health)..."
          curl -sS --fail --retry 12 --retry-delay 5 --retry-connrefused http://localhost:8001/health

          echo "All services are up and healthy!"
