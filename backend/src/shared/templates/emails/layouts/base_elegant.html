<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>{{ self.header_title() }}</title>
    <style>
        body { font-family: 'Georgia', 'Playfair Display', serif; background-color: #fcfbf9; color: #2c2a29; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        .wrapper { padding: 60px 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; border: 1px solid #eae5de; padding: 10px; }
        .inner-border { border: 1px solid #eae5de; padding: 0; }
        .header { padding: 50px 40px 30px 40px; text-align: center; }
        .header h1 { color: #1a1918; margin: 0; font-size: 28px; font-weight: normal; letter-spacing: 1px; text-transform: uppercase; }
        .content { padding: 30px 50px 50px 50px; line-height: 1.8; font-size: 16px; color: #4a4846; }
        .btn-container { text-align: center; margin: 40px 0; }
        .btn { background-color: #1a1918; color: #ffffff !important; padding: 14px 40px; text-decoration: none; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; display: inline-block; transition: opacity 0.2s; }
        .footer { padding: 40px; text-align: center; border-top: 1px solid #eae5de; }
        .footer p { font-size: 12px; color: #8a8683; margin: 5px 0; letter-spacing: 0.5px; }
    </style>
</head>
<body>
<div class="wrapper">
  <div class="container">
    <div class="inner-border">
      <div class="header">
        <h1>{% block header_title %}Welcome{% endblock %}</h1>
      </div>
      <div class="content">
        {% block content %}{% endblock %}
      </div>
      <div class="footer">
        <p>Sent from {{ proj_name }}</p>
        <p>&copy; {{ proj_name }} {{ now().year }}</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
