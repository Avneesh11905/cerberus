<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>{{ self.header_title() }}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; color: #1f2937; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        .wrapper { padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); border: 1px solid #e5e7eb; }
        .header { background: #0d9488; padding: 35px 30px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
        .content { padding: 40px 40px; }
        .footer { padding: 30px 40px; text-align: center; background: #f9fafb; border-top: 1px solid #f3f4f6; }
        .footer p { font-size: 13px; color: #6b7280; margin: 6px 0; }
        .btn-container { text-align: center; margin: 35px 0; }
        .btn { display: inline-block; background-color: #0d9488; color: #ffffff; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-weight: 600; font-size: 15px; letter-spacing: 0.2px; box-shadow: 0 4px 6px -1px rgba(13, 148, 136, 0.2); }
    </style>
</head>
<body>
<div class="wrapper">
  <div class="container">
    <div class="header">
      <h1>{% block header_title %}Welcome{% endblock %}</h1>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>You're receiving this because you signed up for {{ proj_name }}.</p>
      <p>&copy; {{ proj_name }} {{ now().year }}. All rights reserved.</p>
    </div>
  </div>
</div>
</body>
</html>
