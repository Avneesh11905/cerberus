<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>{{ self.header_title() }}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background:#ffffff; color:#111827; margin:0; padding:0; line-height: 1.6; -webkit-font-smoothing: antialiased; }
        .wrapper { padding: 60px 20px; box-sizing: border-box; }
        .container { max-width: 540px; margin: 0 auto; background:#ffffff; border: none; text-align: left; }
        .header { padding: 0 0 24px 0; border-bottom: 1px solid #e5e7eb; margin-bottom: 32px; }
        .header h1 { color: #111827; font-size: 22px; margin:0; font-weight: 600; letter-spacing: -0.5px; }
        .content { padding: 0; font-size: 15px; color: #374151; }
        .content p, .footer p { margin: 0 0 20px 0; padding: 0; }
        .footer { padding: 32px 0 0 0; margin-top: 40px; border-top: 1px solid #e5e7eb; font-size: 13px; color:#6b7280; }
        .btn-container { text-align: center; margin: 32px 0; }
        .btn { display: inline-block; background-color: #111827; color: #ffffff; text-decoration: none; padding: 12px 28px; font-weight: 500; font-size: 14px; border-radius: 6px; letter-spacing: 0.2px; }
    </style>
</head>
<body>
<div class="wrapper">
  <div class="container">
    <div class="header">
      <h1>{% block header_title %}Welcome{% endblock %}</h1>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>You received this because you signed up for {{ proj_name }}.</p>
      <p>&copy; {{ proj_name }} {{ now().year }}</p>
    </div>
  </div>
</div>
</body>
</html>
